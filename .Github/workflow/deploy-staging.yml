name: Deploy TaskFlow to Azure

on:
  push:
    branches:
      - main

workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: - name: npm install and build
  run: |
    npm install
    npm run build --if-present
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: taskflow-staging-btdgembcg0b5gqee.australiaeast-01.azurewebsites.net
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .
